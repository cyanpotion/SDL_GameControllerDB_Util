# Daily Build Workflow for SDL_GameControllerDB_Util
# This workflow runs daily to fetch the latest gamecontrollerdb.txt and rebuild the package

name: Daily Build

on:
  schedule:
    # Run at 02:00 UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for proper versioning
          fetch-depth: 0
          # Use a token with push permission
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      
      - name: Download latest gamecontrollerdb.txt
        run: |
          # Download the latest gamecontrollerdb.txt
          curl -L -o /tmp/gamecontrollerdb.txt.new \
            "https://raw.githubusercontent.com/gabomdq/SDL_GameControllerDB/master/gamecontrollerdb.txt"
          
          # Compare with existing file if exists
          if [ -f "target/classes/gamecontrollerdb.txt" ]; then
            if diff -q /tmp/gamecontrollerdb.txt.new target/classes/gamecontrollerdb.txt > /dev/null 2>&1; then
              echo "No changes in gamecontrollerdb.txt"
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "gamecontrollerdb.txt has been updated"
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "First run or no existing file"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        id: check_changes
      
      - name: Build with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw clean install -Penforce
      
      - name: Check if rebuild needed
        run: |
          # Extract version from pom.xml
          CURRENT_VERSION=$(grep -oP '(?<=<version>)[^<]+' pom.xml | head -1)
          echo "Current version: $CURRENT_VERSION"
          
          # Check if we need to update version based on date
          TODAY=$(date +'%Y%m%d')
          if echo "$CURRENT_VERSION" | grep -q "$TODAY"; then
            echo "Version already updated today"
            echo "version_update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Version needs update for today: $TODAY"
            echo "version_update_needed=true" >> $GITHUB_OUTPUT
            echo "new_version=1.9.$TODAY" >> $GITHUB_OUTPUT
          fi
        id: version_check
      
      - name: Update version and commit
        if: steps.version_check.outputs.version_update_needed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Update version in pom.xml
          NEW_VERSION=${{ steps.version_check.outputs.new_version }}
          sed -i "s/<version>.*<\/version>/<version>$NEW_VERSION<\/version>/" pom.xml
          
          # Commit the version update
          git add pom.xml
          git commit -m "chore: update version to $NEW_VERSION for daily build"
          git push
      
      - name: Deploy to Maven Central
        if: steps.version_check.outputs.version_update_needed == 'true'
        run: |
          ./mvnw deploy -Possrh -DskipTests \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} \
            -DautoReleaseAfterClose=true
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.date.outputs.date }}
          path: |
            target/*.jar
            target/classes/gamecontrollerdb.txt
          retention-days: 30
      
      - name: Create Release
        if: steps.version_check.outputs.version_update_needed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version_check.outputs.new_version }}
          name: Release ${{ steps.version_check.outputs.new_version }}
          body: |
            Daily automated build for ${{ steps.date.outputs.date }}
            
            This release includes the latest gamecontrollerdb.txt from [SDL_GameControllerDB](https://github.com/gabomdq/SDL_GameControllerDB).
            
            ## Changes
            - Updated gamecontrollerdb.txt to latest version
            - Version bump to ${{ steps.version_check.outputs.new_version }}
          files: |
            target/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
