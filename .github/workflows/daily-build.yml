# Daily Build Workflow for SDL_GameControllerDB_Util
# This workflow runs daily to fetch the latest gamecontrollerdb.txt and
# rebuild/publish only when the upstream file has actually changed.

name: Daily Build

on:
  schedule:
    # Run at 02:00 UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      force:
        description: 'Force deploy even if gamecontrollerdb.txt has not changed'
        type: boolean
        default: false
        required: false
      version-suffix:
        description: 'Optional version suffix (e.g. -1, -2) to avoid duplicate release tags on the same day'
        type: string
        default: ''
        required: false

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MYTOKEN }}

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: github-actions
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Check for upstream changes
        id: upstream
        run: |
          curl -L --fail -o /tmp/gamecontrollerdb.txt.new \
            "https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt"

          if [ ! -s /tmp/gamecontrollerdb.txt.new ]; then
            echo "Failed to download gamecontrollerdb.txt" >&2
            exit 1
          fi

          if [ ! -f "src/main/resources/gamecontrollerdb.txt" ]; then
            echo "No local baseline found; treating as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif diff -q /tmp/gamecontrollerdb.txt.new src/main/resources/gamecontrollerdb.txt > /dev/null 2>&1; then
            echo "gamecontrollerdb.txt is up to date"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "gamecontrollerdb.txt has changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if nothing changed
        if: steps.upstream.outputs.changed == 'false' && inputs.force != true
        run: |
          echo "No upstream changes detected and force is not set. Skipping build and release."
          exit 0

      - name: Prepare new version
        if: steps.upstream.outputs.changed == 'true' || inputs.force == true
        id: version
        run: |
          TODAY=$(date +'%Y%m%d')
          SUFFIX='${{ inputs.version-suffix }}'
          NEW_VERSION="1.9.${TODAY}${SUFFIX}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "date=${TODAY}" >> "$GITHUB_OUTPUT"

      - name: Update baseline and pom.xml version
        if: steps.upstream.outputs.changed == 'true' || inputs.force == true
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          cp /tmp/gamecontrollerdb.txt.new src/main/resources/gamecontrollerdb.txt

          NEW_VERSION=${{ steps.version.outputs.new_version }}
          sed -i '/<artifactId>SDL_GameControllerDB_Util<\/artifactId>/{n;s/<version>[^<]*<\/version>/<version>'$NEW_VERSION'<\/version>/}' pom.xml

          UPDATED_VERSION=$(grep -A1 '<artifactId>SDL_GameControllerDB_Util</artifactId>' pom.xml | grep -oP '(?<=<version>)[^<]+')
          echo "Updated project version to: $UPDATED_VERSION"

          git add pom.xml src/main/resources/gamecontrollerdb.txt
          git commit -m "chore: update gamecontrollerdb.txt and version to ${NEW_VERSION}"
          git push

      - name: Build and deploy with Maven
        if: steps.upstream.outputs.changed == 'true' || inputs.force == true
        run: |
          ./mvnw clean deploy -Pcentral -DskipTests \
            -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }}
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload artifacts
        if: steps.upstream.outputs.changed == 'true' || inputs.force == true
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ steps.version.outputs.date }}
          path: |
            target/*.jar
            src/main/resources/gamecontrollerdb.txt
          retention-days: 30

      - name: Create Release
        if: steps.upstream.outputs.changed == 'true' || inputs.force == true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body: |
            Daily automated build for ${{ steps.version.outputs.date }}

            This release includes the latest gamecontrollerdb.txt from [SDL_GameControllerDB](https://github.com/mdqinc/SDL_GameControllerDB).

            ## Changes
            - Updated gamecontrollerdb.txt to latest upstream version
            - Version bump to ${{ steps.version.outputs.new_version }}
          files: |
            target/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
